name: Artha AI CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install lint tools
      run: |
        python -m pip install --upgrade pip
        pip install ruff mypy pydantic pydantic-settings

    - name: Ruff lint check
      run: ruff check app/

    - name: Mypy type check
      run: mypy app/ --ignore-missing-imports

  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt

    - name: Run tests with coverage gate (>= 80%)
      env:
        SECRET_KEY: "super_secret_key_for_testing_purposes_long_enough"
        GROQ_API_KEY: ""
      run: |
        PYTHONPATH=. pytest --cov=app --cov-report=xml --cov-fail-under=80 -v

    - name: Upload coverage report
      uses: actions/upload-artifact@v4
      if: always()
      with:
        name: coverage-report
        path: coverage.xml

  deploy:
    needs: test
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Push to Hugging Face Spaces
      env:
        HF_TOKEN: ${{ secrets.HF_TOKEN }}
      run: |
        pip install huggingface_hub
        python -c "
        import os
        from huggingface_hub import HfApi
        api = HfApi()
        api.upload_folder(
            folder_path='.',
            repo_id='Gaurav711/Artha_ai',
            repo_type='space',
            token=os.environ['HF_TOKEN'],
            ignore_patterns=['.git', '.venv*', '__pycache__', '*.pyc', 'coverage.xml']
        )
        "
