version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: artha_postgres
    environment:
      POSTGRES_USER: artha_admin
      POSTGRES_PASSWORD: artha_password_secure_2026
      POSTGRES_DB: artha_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U artha_admin -d artha_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: artha_redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: artha_zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: artha_kafka
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092,PLAINTEXT_INTERNAL://kafka:29092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_INTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT_INTERNAL
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      # Optimize JVM footprint for local runs
      KAFKA_JVM_PERFORMANCE_OPTS: "-Xms256M -Xmx518M -XX:MetaspaceSize=96m -XX:MaxMetaspaceSize=128m -XX:+UseG1GC"
      KAFKA_LOG_RETENTION_HOURS: 2
      KAFKA_LOG_SEGMENT_BYTES: 104857600

  artha_api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: artha_api_gateway
    ports:
      - "8000:8000"
    environment:
      - ENV=production
      - PORT=8000
      - SECRET_KEY=9aefc882875b4dbab2059346d03cf955848e02d64f0616b2bc3193ce140c883e
      - POSTGRES_USER=artha_admin
      - POSTGRES_PASSWORD=artha_password_secure_2026
      - POSTGRES_DB=artha_db
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - KAFKA_BOOTSTRAP_SERVERS=kafka:29092
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  pgdata:
  redisdata:
