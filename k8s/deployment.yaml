apiVersion: apps/v1
kind: Deployment
metadata:
  name: artha-ai-deployment
  namespace: default
  labels:
    app: artha-ai
    tier: backend
spec:
  replicas: 3
  revisionHistoryLimit: 5
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: artha-ai
  template:
    metadata:
      labels:
        app: artha-ai
    spec:
      containers:
      - name: artha-ai-container
        image: gaurav711/artha-ai:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 7860
        resources:
          requests:
            cpu: "250m"
            memory: "512Mi"
          limits:
            cpu: "1000m"
            memory: "2Gi"
        env:
        - name: ENV
          value: "production"
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: artha-secrets
              key: secret-key
        - name: GROQ_API_KEY
          valueFrom:
            secretKeyRef:
              name: artha-secrets
              key: groq-api-key
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: artha-secrets
              key: database-url
        - name: REDIS_URL
          valueFrom:
            secretKeyRef:
              name: artha-secrets
              key: redis-url
        - name: ADMIN_USERNAME
          value: "admin"
        - name: ADMIN_PASSWORD
          valueFrom:
            secretKeyRef:
              name: artha-secrets
              key: admin-password
        - name: ANALYST_USERNAME
          value: "analyst"
        - name: ANALYST_PASSWORD
          valueFrom:
            secretKeyRef:
              name: artha-secrets
              key: analyst-password
        - name: READONLY_USERNAME
          value: "readonly"
        - name: READONLY_PASSWORD
          valueFrom:
            secretKeyRef:
              name: artha-secrets
              key: readonly-password
        livenessProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 30
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /health
            port: 7860
          initialDelaySeconds: 20
          periodSeconds: 10
          timeoutSeconds: 3
          successThreshold: 1
          failureThreshold: 2
---
apiVersion: v1
kind: Service
metadata:
  name: artha-ai-service
  namespace: default
  labels:
    app: artha-ai
spec:
  type: LoadBalancer
  ports:
  - port: 80
    targetPort: 7860
    protocol: TCP
    name: http
  selector:
    app: artha-ai
