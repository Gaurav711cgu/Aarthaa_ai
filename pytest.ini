[pytest]
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::UserWarning
    ignore:.*import python_multipart.*:PendingDeprecationWarning

addopts =
    --cov=app
    --cov-report=term-missing
    --cov-report=xml
    --cov-omit=app/ui/dashboard.py
    -v
